<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed | Glowtiqa Paris</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #f9f5eb;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .thank-you-card {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            max-width: 500px;
            width: 90%;
        }
        .check-icon {
            font-size: 60px;
            color: #28a745;
            margin-bottom: 20px;
        }
        h1 { color: #b68d40; margin-bottom: 10px; }
        p { color: #666; line-height: 1.6; margin-bottom: 20px; }
        .btn-home {
            background-color: #b68d40;
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            display: inline-block;
        }
        .btn-home:hover { background-color: #a07c36; }
    </style>
</head>
<body>

    <div class="thank-you-card">
        <i class="fas fa-check-circle check-icon"></i>
        <h1>Order Confirmed!</h1>
        <p>Thank you for choosing Glowtiqa Paris. We have received your order and are preparing it for shipment.</p>
        <p>You will receive a confirmation call or WhatsApp message from us shortly.</p>
        <a href="index.html" class="btn-home">Continue Shopping</a>
    </div>

</body>
</html>
